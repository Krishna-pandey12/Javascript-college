<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bulb Toggle</title>
</head>
<body style="text-align:center; margin-top:50px;">

  <h2>Bulb ON/OFF using DOM</h2>

  <!-- Start with OFF image -->
  <img id="bulb" src="Bulb.jpg" width="150">

  <br><br>

  <button id="onBtn">Turn ON</button>
  <button id="offBtn">Turn OFF</button>

  <script>
    let bulb = document.querySelector("#bulb");
    let onBtn = document.querySelector("#onBtn");
    let offBtn = document.querySelector("#offBtn");

    onBtn.addEventListener("click", () => {
      bulb.src = "Bulbon.jpg";   // ON image
    });

    offBtn.addEventListener("click", () => {
      bulb.src = "Bulb.jpg";  // OFF image
    });
  </script>

</body>
</html>
